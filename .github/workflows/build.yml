name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build
        run: ./py/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: superset-query-linux
          path: dist/linux/

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build
        run: ./py/build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: superset-query-win
          path: dist/win/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build
        run: ./py/build-mac.sh
      - uses: actions/upload-artifact@v4
        with:
          name: superset-query-mac
          path: dist/mac/


