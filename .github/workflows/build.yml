name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build in manylinux container (glibc 2.17 compat)
        run: |
          cat > Dockerfile.build.linux << 'EOF'
          FROM ubuntu:22.04 AS builder
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y --no-install-recommends python3 python3-pip python3-dev && rm -rf /var/lib/apt/lists/*
          RUN python3 -m pip install --no-cache-dir pyinstaller requests cryptography keyring
          WORKDIR /src
          COPY py/query_superset.py .
          RUN python3 -m PyInstaller --onefile --noconfirm --strip \
              --name superset-query \
              --hidden-import cryptography \
              --hidden-import cryptography.fernet \
              --hidden-import cryptography.hazmat.backends.openssl \
              --hidden-import cryptography.hazmat.primitives.ciphers \
              --hidden-import keyring \
              --hidden-import keyring.backends \
              query_superset.py
          FROM scratch
          COPY --from=builder /src/dist/superset-query /superset-query
          EOF
          mkdir -p dist/linux
          docker buildx build --output type=local,dest=dist/linux -f Dockerfile.build.linux .
          chmod +x dist/linux/superset-query
      - uses: actions/upload-artifact@v4
        with:
          name: superset-query-linux
          path: dist/linux/

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build
        run: ./py/build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: superset-query-win
          path: dist/win/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build
        run: ./py/build-mac.sh
      - uses: actions/upload-artifact@v4
        with:
          name: superset-query-mac
          path: dist/mac/


